<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Производственные возможности ПРОМЕТ</title>

<style>
body {
    margin: 0;
    font-family: Inter, Segoe UI, Arial, sans-serif;
    background: #f3f7fb;
    color: #172233;
}

.header {
    background: linear-gradient(90deg, #1f4e8c, #2d6dc4);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    border-radius: 0 0 20px 20px;
}

.container {
    max-width: 1400px;
    margin: 30px auto;
    padding: 0 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.06);
}

thead {
    background: #e9eef5;
}

th, td {
    padding: 14px 12px;
    text-align: left;
    font-size: 14px;
    vertical-align: top;
}

th {
    font-weight: 600;
    color: #2c3e55;
}

tr:nth-child(even) {
    background: #f8fbff;
}

img {
    max-width: 80px;
    border-radius: 6px;
}

/* ===== МОБИЛЬНАЯ ВЕРСИЯ ===== */
@media (max-width: 768px) {

    table, thead, tbody, th, td, tr {
        display: block;
    }

    thead {
        display: none;
    }

    tr {
        background: white;
        margin-bottom: 18px;
        border-radius: 14px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        padding: 15px;
    }

    td {
        padding: 8px 0;
        font-size: 14px;
    }

    td::before {
        font-weight: 600;
        display: block;
        margin-bottom: 4px;
        color: #1f4e8c;
    }

    td:nth-child(1)::before { content: "№"; }
    td:nth-child(2)::before { content: "Фото"; }
    td:nth-child(3)::before { content: "Наименование"; }
    td:nth-child(4)::before { content: "Как изготавливают"; }
    td:nth-child(5)::before { content: "Производственные возможности"; }
    td:nth-child(6)::before { content: "Партия, шт."; }

}
</style>
</head>

<body>

<div class="header">
Производственные возможности ПРОМЕТ по Гардеробной Системе ПРАКТИК HOME
</div>

<div class="container">

<table>
<thead>
<tr>
<th>№</th>
<th>Фото</th>
<th>Наименование</th>
<th>Как изготавливают</th>
<th>Производственные возможности</th>
<th>Партия, шт.</th>
</tr>
</thead>

<tbody>

<!-- ВСТАВЬ СЮДА СВОИ СТРОКИ ИЗ ТЕКУЩЕЙ ВЕРСИИ -->
<!-- Формат строки: -->

<tr>
<td>1</td>
<td><img src="images/element1.jpg" alt=""></td>
<td>Наименование элемента</td>
<td>Описание процесса производства</td>
<td>Мощности производства</td>
<td>1000</td>
</tr>

</tbody>
</table>

</div>

</body>
</html>
